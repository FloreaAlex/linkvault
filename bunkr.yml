mode: dev-review
task:
  title: "Make LinkVault UI beautiful without adding build tools"
  description: |
    A design debate concluded: improve the existing CSS without adding 
    build tools like Tailwind or PostCSS. Keep it vanilla CSS.
    
    Make the UI look like a professional product:
    - Grid layout for bookmarks (2-3 columns on desktop, 1 on mobile)
    - Better card design with subtle shadows and hover animations
    - Improved color palette (not just flat purple)
    - Better typography hierarchy
    - Smooth transitions on all interactive elements
    - The bookmark list should be the hero — visible immediately
    - The form should be in a modal (click + Add Bookmark to open)
    - Make it responsive

agents:
  developer:
    persona: developers/frontend-specialist
    provider: local
    tools: [read, write, shell, git]
  reviewer:
    persona: reviewers/pragmatic-reviewer
    provider: local
    tools: [read, shell]

providers:
  local:
    api_key: none
    base_url: http://host.docker.internal:8000/v1
    tier_map:
      frontier: openai/gpt-oss-120b
      reasoning: openai/gpt-oss-120b
      coding: openai/gpt-oss-120b
      fast: openai/gpt-oss-120b

orchestration:
  max_iterations: 3
