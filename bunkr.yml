mode: council
task:
  title: "Review LinkVault API for quality and completeness"
  description: |
    Review the LinkVault bookmark manager API.
    Is it well-structured? Are there bugs? Is error handling sufficient?
    Does it meet the requirements (save, browse, search, filter by tag, stats)?
    What's missing? What should be improved?
agents:
  pragmatic:
    persona: reviewers/pragmatic-reviewer
    provider: local
  security:
    persona: reviewers/security-reviewer
    provider: local
  adversarial:
    persona: reviewers/adversarial-reviewer
    provider: local
providers:
  local:
    api_key: none
    base_url: http://localhost:8000/v1
    tier_map:
      frontier: openai/gpt-oss-120b
      reasoning: openai/gpt-oss-120b
      coding: openai/gpt-oss-120b
      fast: openai/gpt-oss-120b
orchestration:
  strategy: majority
