mode: dev-review
task:
  title: "Make LinkVault UI beautiful"
  description: |
    The UI debate concluded: improve existing CSS without build tools.
    
    Make it look like a professional product:
    - Grid layout for bookmarks (2-3 columns on desktop)
    - Card shadows and hover effects with transitions
    - Better color palette with gradients
    - Good typography with proper hierarchy
    - Responsive (works on mobile)
    - Form in a modal (toggle with + button)
    - Bookmark list is the hero — visible immediately
    - Empty state when no bookmarks exist

agents:
  developer:
    persona: developers/frontend-specialist
    provider: local
    tools: [read, write, shell, git]
  reviewer:
    persona: reviewers/pragmatic-reviewer
    provider: local
    tools: [read, shell]

providers:
  local:
    api_key: none
    base_url: http://localhost:8000/v1
    tier_map:
      frontier: openai/gpt-oss-120b
      reasoning: openai/gpt-oss-120b
      coding: openai/gpt-oss-120b
      fast: openai/gpt-oss-120b

orchestration:
  max_iterations: 3
