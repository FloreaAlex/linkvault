mode: dev-review
task:
  title: "Redesign LinkVault UI to be truly impressive"
  description: |
    The current UI works but looks amateur. Redesign it to be something 
    you'd show in a portfolio. Think of apps like Raindrop.io or Pinboard 
    but simpler.
    
    Key problems to fix:
    - The form takes up too much space above the bookmarks
    - Bookmarks should be the hero content — visible immediately
    - Needs visual hierarchy: what's important should stand out
    - Tag pills need better colors (not all the same)
    - The "Add" form should be collapsible or in a modal
    - Search should be prominent but not take a whole section
    - Need empty state messaging when no bookmarks exist
    
    You have full creative freedom on the implementation approach.
    Research modern UI patterns if needed.

agents:
  developer:
    persona: developers/frontend-specialist
    provider: local
    tools: [read, write, shell, git, web]
    mcp: [tavily]
  reviewer:
    persona: reviewers/pragmatic-reviewer
    provider: local
    tools: [read, shell]

providers:
  local:
    api_key: none
    base_url: http://localhost:8000/v1
    tier_map:
      frontier: openai/gpt-oss-120b
      reasoning: openai/gpt-oss-120b
      coding: openai/gpt-oss-120b
      fast: openai/gpt-oss-120b

mcp_servers:
  tavily:
    env:
      TAVILY_API_KEY: placeholder
      HTTPS_PROXY: http://x:aoc_a37eb8798237351d8dc6c1d468c406c805766ab1814fb2cb1fa784fc225ac223@localhost:10255
