mode: dev-review
task:
  title: "Improve LinkVault based on council review findings"
  description: |
    The council reviewed LinkVault and found issues.
    Fix them and add any missing features for a complete bookmark manager.
    Research best practices online if needed.

agents:
  developer:
    persona: developers/senior-fullstack
    provider: local
    tools: [read, write, shell, git, web]
  reviewer:
    persona: reviewers/adversarial-reviewer
    provider: local
    tools: [read, shell, git, web]

providers:
  local:
    api_key: none
    base_url: http://localhost:8000/v1
    tier_map:
      frontier: openai/gpt-oss-120b
      reasoning: openai/gpt-oss-120b
      coding: openai/gpt-oss-120b
      fast: openai/gpt-oss-120b

mcp_servers:
  tavily:
    env:
      TAVILY_API_KEY: ${TAVILY_API_KEY}
  github:
    env:
      GITHUB_TOKEN: ${GITHUB_TOKEN}

orchestration:
  max_iterations: 3
