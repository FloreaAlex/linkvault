mode: dev-review
task:
  title: "Make LinkVault UI modern and beautiful"
  description: |
    The current UI is too basic and ugly. Make it look like a modern web app:
    - Dark theme with good contrast
    - Cards for each bookmark with hover effects
    - Smooth animations and transitions
    - Better typography and spacing
    - Mobile responsive
    - The bookmark list should show below the search/form area
    - Each bookmark card should show title (linked), description, tags as colored pills, and a delete button
    - Make the overall design feel polished and professional

agents:
  developer:
    persona: developers/frontend-specialist
    provider: local
    tools: [read, write, shell, git, web]
    mcp: [tavily]
  reviewer:
    persona: reviewers/pragmatic-reviewer
    provider: local
    tools: [read, shell]

providers:
  local:
    api_key: none
    base_url: http://localhost:8000/v1
    tier_map:
      frontier: openai/gpt-oss-120b
      reasoning: openai/gpt-oss-120b
      coding: openai/gpt-oss-120b
      fast: openai/gpt-oss-120b

mcp_servers:
  tavily:
    env:
      TAVILY_API_KEY: placeholder
      HTTPS_PROXY: http://x:aoc_a37eb8798237351d8dc6c1d468c406c805766ab1814fb2cb1fa784fc225ac223@localhost:10255
      NODE_EXTRA_CA_CERTS: /home/yuji/.onecli-ca.pem
      NODE_USE_ENV_PROXY: "1"

orchestration:
  max_iterations: 3
