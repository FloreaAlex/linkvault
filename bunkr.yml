mode: dev-review
task:
  title: "Add import and export JSON buttons to LinkVault"
  description: |
    Add two features to the bookmark manager:
    1. Export button that downloads all bookmarks as a JSON file
    2. Import button that lets you upload a JSON file to add bookmarks
    Keep the existing UI working — don't break bookmark rendering.

agents:
  developer:
    persona: developers/frontend-specialist
    provider: local
    tools: [read, write, shell, git]
  reviewer:
    persona: reviewers/pragmatic-reviewer
    provider: local
    tools: [read, shell]

providers:
  local:
    api_key: none
    base_url: http://host.docker.internal:8000/v1
    tier_map:
      frontier: openai/gpt-oss-120b
      reasoning: openai/gpt-oss-120b
      coding: openai/gpt-oss-120b
      fast: openai/gpt-oss-120b

orchestration:
  max_iterations: 2
