mode: dev-review
task:
  title: "Add a web UI to LinkVault"
  description: |
    LinkVault has a REST API but no web interface.
    Build a clean, modern web UI that lets users:
    - See all their bookmarks in a nice layout
    - Add new bookmarks with a form
    - Filter by tag (clickable tags)
    - Search bookmarks
    - Delete bookmarks
    - See stats (total count, popular tags)
    
    The UI should be served by the same Express server.
    Make it look professional — this is a portfolio piece.

agents:
  developer:
    persona: developers/frontend-specialist
    provider: local
    tools: [read, write, shell, git, web]
    mcp: [tavily]
  reviewer:
    persona: reviewers/pragmatic-reviewer
    provider: local
    tools: [read, shell]

providers:
  local:
    api_key: none
    base_url: http://localhost:8000/v1
    tier_map:
      frontier: openai/gpt-oss-120b
      reasoning: openai/gpt-oss-120b
      coding: openai/gpt-oss-120b
      fast: openai/gpt-oss-120b

mcp_servers:
  tavily:
    env:
      TAVILY_API_KEY: placeholder
      HTTPS_PROXY: http://x:aoc_a37eb8798237351d8dc6c1d468c406c805766ab1814fb2cb1fa784fc225ac223@localhost:10255
      NODE_EXTRA_CA_CERTS: /home/yuji/.onecli-ca.pem
      NODE_USE_ENV_PROXY: "1"

orchestration:
  max_iterations: 3
