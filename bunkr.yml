mode: dev-review
task:
  title: "Add edit and import/export to LinkVault"
  description: |
    LinkVault needs these features:
    1. Edit existing bookmarks (click to edit title, URL, description, tags)
    2. Export all bookmarks as JSON (download button)
    3. Import bookmarks from JSON file (upload button)
    4. Show bookmark creation date in a human-friendly format
    5. Add a favicon

agents:
  developer:
    persona: developers/frontend-specialist
    provider: local
    tools: [read, write, shell, git]
  reviewer:
    persona: reviewers/pragmatic-reviewer
    provider: local
    tools: [read, shell]

providers:
  local:
    api_key: none
    base_url: http://localhost:8000/v1
    tier_map:
      frontier: openai/gpt-oss-120b
      reasoning: openai/gpt-oss-120b
      coding: openai/gpt-oss-120b
      fast: openai/gpt-oss-120b

orchestration:
  max_iterations: 3
