<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LinkVault</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>LinkVault</h1>
    <div id="auth">
      <label for="token">API Token:</label>
      <input type="password" id="token" placeholder="optional token" />
    </div>
    <!-- Search moved to header for prominence -->
    <section id="search" class="header-search">
      <input type="text" id="search-input" placeholder="Search…" />
      <button id="search-btn">🔍</button>
      <button id="clear-search">✕</button>
    </section>
    <!-- Add bookmark button triggers modal -->
    <button id="open-add-modal" class="add-btn">+ Add Bookmark</button>
  </header>

  <section id="stats"></section>

  <!-- Modal for adding a bookmark -->
<div id="add-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close-btn" id="close-add-modal">&times;</span>
    <h2>Add Bookmark</h2>
    <form id="bookmark-form">
      <input type="text" id="title" placeholder="Title" required />
      <input type="url" id="url" placeholder="URL" required />
      <textarea id="description" placeholder="Description"></textarea>
      <input type="text" id="tags" placeholder="Tags (comma separated)" />
      <button type="submit">Add</button>
    </form>
  </div>
</div>

  <!-- Search moved to header; this section removed -->

  <section id="bookmarks">
    <h2>Bookmarks</h2>
    <div id="bookmark-list"></div>
  </section>

<script src="app.js"></script>
</body>
</html>
